<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shipping Ops</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Shipping ops</p>
          <h1>Shipment work queue</h1>
        </div>
        <div class="topActions">
          <button id="internationalExportButton" type="button" class="secondary">International Excel</button>
          <button id="syncButton" type="button" class="secondary">Sync Wix</button>
          <button id="refreshButton" type="button">Refresh</button>
        </div>
      </header>

      <section class="metrics" aria-label="Shipping summary">
        <div class="metric">
          <span>Needs booking</span>
          <strong id="needsBookingCount">0</strong>
        </div>
        <div class="metric">
          <span>Booked today</span>
          <strong id="bookedTodayCount">0</strong>
        </div>
        <div class="metric">
          <span>Failed</span>
          <strong id="failedCount">0</strong>
        </div>
        <div class="metric">
          <span>Wix sync failed</span>
          <strong id="wixFailedCount">0</strong>
        </div>
        <div class="metric wide">
          <span>Last Wix sync</span>
          <strong id="lastSyncText">Not run</strong>
        </div>
      </section>

      <section class="panel">
        <div class="queueHeader">
          <div class="tabs" role="tablist" aria-label="Queue filters">
            <button type="button" class="tab active" data-queue="needs_shipping">Needs booking</button>
            <button type="button" class="tab" data-queue="booked">Booked</button>
            <button type="button" class="tab" data-queue="wix_update_failed">Wix update failed</button>
            <button type="button" class="tab" data-queue="failed">Failed booking</button>
            <button type="button" class="tab" data-queue="international_pending">International pending</button>
            <button type="button" class="tab" data-queue="all_recent">All recent</button>
          </div>
          <span id="ordersStatusText">Loading...</span>
        </div>

        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Order</th>
                <th>Destination</th>
                <th>Items</th>
                <th>Shipping</th>
                <th>Shipment</th>
                <th>Wix</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <aside id="drawer" class="drawer" aria-hidden="true">
      <div class="drawerPanel">
        <div class="drawerHeader">
          <div>
            <p class="eyebrow">Order details</p>
            <h2 id="drawerTitle">Order</h2>
          </div>
          <button id="drawerClose" type="button" class="iconButton" aria-label="Close">x</button>
        </div>
        <div id="drawerBody" class="drawerBody"></div>
      </div>
    </aside>

    <script src="/app.js" type="module"></script>
  </body>
</html>
