<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shipping Ops</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Shipping ops</p>
          <h1>Shipment work queue</h1>
        </div>
        <div class="topActions">
          <button id="internationalExportButton" type="button" class="secondary">International Excel</button>
          <button id="syncButton" type="button" class="secondary">Sync Wix</button>
          <button id="syncFulfilledButton" type="button" class="secondary">Sync Fulfilled</button>
          <button id="syncCancelledButton" type="button" class="secondary">Sync Cancelled</button>
          <button id="pullTrackingButton" type="button" class="secondary">Pull Tracking</button>
          <button id="refreshButton" type="button">Refresh</button>
        </div>
      </header>

      <section class="metrics" aria-label="Shipping summary">
        <div class="metric">
          <span>Needs packing</span>
          <strong id="needsPackingCount">0</strong>
        </div>
        <div class="metric">
          <span>Needs booking</span>
          <strong id="needsBookingCount">0</strong>
        </div>
        <div class="metric">
          <span>Ready for pickup</span>
          <strong id="readyPickupCount">0</strong>
        </div>
        <div class="metric">
          <span>In transit</span>
          <strong id="inTransitCount">0</strong>
        </div>
        <div class="metric">
          <span>Needs call</span>
          <strong id="needsCallCount">0</strong>
        </div>
        <div class="metric">
          <span>Completed</span>
          <strong id="completedCount">0</strong>
        </div>
      </section>

      <section class="panel">
        <div class="queueHeader">
          <div class="tabs" role="tablist" aria-label="Queue filters">
            <button type="button" class="tab active" data-queue="needs_packing">Needs packing</button>
            <button type="button" class="tab" data-queue="needs_booking">Needs booking</button>
            <button type="button" class="tab" data-queue="ready_for_pickup">Ready for pickup</button>
            <button type="button" class="tab" data-queue="in_transit">In transit</button>
            <button type="button" class="tab" data-queue="needs_call">Needs call</button>
            <button type="button" class="tab" data-queue="completed">Completed</button>
            <button type="button" class="tab" data-queue="wix_update_failed">Wix failed</button>
            <button type="button" class="tab" data-queue="failed">Failed booking</button>
            <button type="button" class="tab" data-queue="international_pending">International pending</button>
            <button type="button" class="tab" data-queue="cancelled">Cancelled</button>
            <button type="button" class="tab" data-queue="all_recent">All recent</button>
          </div>
          <span id="ordersStatusText">Loading...</span>
        </div>

        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Order</th>
                <th>Destination</th>
                <th>Items</th>
                <th>Shipping</th>
                <th>Shipment</th>
                <th>Wix</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <aside id="drawer" class="drawer" aria-hidden="true">
      <div class="drawerPanel">
        <div class="drawerHeader">
          <div>
            <p class="eyebrow">Order details</p>
            <h2 id="drawerTitle">Order</h2>
          </div>
          <button id="drawerClose" type="button" class="iconButton" aria-label="Close">x</button>
        </div>
        <div id="drawerBody" class="drawerBody"></div>
      </div>
    </aside>

    <script src="/app.js" type="module"></script>
  </body>
</html>
